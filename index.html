<!DOCTYPE html>
<html lang="en">
<head>

<title>Matchology</title>
<style>

    margin: 0;

  }

    margin-right: 20px;
  }

  .box {
    border: 1px solid #5c7a7a;
    padding: 15px;
    margin-bottom: 20px;
    background-color: #f9f9f9;
  }

  .box button {
    margin-top: 10px;
  }

  .sidebar {
    flex: 1;
  }

  .sidebar h3 {
    border-bottom: 1px solid gray;
    padding-bottom: 5px;
  }

  .sidebar a {
    display: block;
    margin: 5px 0;
    color: blue;
    text-decoration: none;
  }

  .footer {
    padding: 20px;
    font-size: 12px;
  }
</style>
</head>

<div class="header">
